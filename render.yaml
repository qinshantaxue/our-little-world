# Render 一键部署配置
# 参考: https://render.com/docs/yaml-spec

services:
  - type: web
    name: our-little-world
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: our-little-world-db
          property: connectionString

databases:
  - name: our-little-world-db
    plan: free
    databaseName: couple_space
